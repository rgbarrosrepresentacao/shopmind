<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Icon: Brain + Store fusion -->
  <defs>
    <linearGradient id="brand-gradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="brain-glow" x1="10" y1="8" x2="34" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Rounded square container -->
  <rect x="2" y="4" width="40" height="40" rx="10" fill="url(#brand-gradient)"/>
  <!-- Brain icon (simplified neural paths) -->
  <path d="M22 14c-4 0-7 2.5-7 6 0 1.8 1 3.4 2.5 4.5L17 32h4l.5-6h1l.5 6h4l-.5-7.5C28 23.4 29 21.8 29 20c0-3.5-3-6-7-6z" fill="white" opacity="0.95"/>
  <circle cx="19" cy="19" r="1.2" fill="url(#brand-gradient)"/>
  <circle cx="25" cy="19" r="1.2" fill="url(#brand-gradient)"/>
  <path d="M19 19c0 0 1.5 2.5 3 2.5s3-2.5 3-2.5" stroke="url(#brand-gradient)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Sparkle dots (intelligence) -->
  <circle cx="12" cy="12" r="1.5" fill="#60A5FA" opacity="0.6"/>
  <circle cx="34" cy="10" r="1" fill="#A78BFA" opacity="0.5"/>
  <circle cx="36" cy="18" r="0.8" fill="#60A5FA" opacity="0.4"/>
  <!-- Wordmark: ShopMind -->
  <text x="52" y="32" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="26" letter-spacing="-0.5" fill="currentColor">
    <tspan fill="#F8FAFC">Shop</tspan><tspan fill="url(#brain-glow)">Mind</tspan>
  </text>
</svg>
